let history = [];
const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const statusEl = document.getElementById('status');
const inputEl = document.getElementById('msg-input');

function getTime() {
  const now = new Date();
  return now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
}

function addMessage(text, role) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ' + role;
  const parts = text.split('\n').filter(p => p.trim());
  parts.forEach((part, i) => {
    const bwrap = document.createElement('div');
    bwrap.className = 'bubble-wrap ' + role;
    bwrap.style.animationDelay = (i * 0.15) + 's';
    const b = document.createElement('div');
    b.className = 'bubble';
    b.innerHTML = part.trim().replace(/\n/g,'<br>') + '<div class="time">' + getTime() + '</div>';
    bwrap.appendChild(b);
    messagesEl.insertBefore(bwrap, typingEl);
  });
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  // Comprobar si ya guardaste una API Key en tu navegador, si no, pedirla una sola vez
  let apiKey = localStorage.getItem('anthropic_api_key');
  if (!apiKey || apiKey.trim() === "" || apiKey.includes("TU_API_KEY")) {
    apiKey = prompt("Por favor, introduce tu API Key de Anthropic para activar a Vale (Se guardará de forma segura en tu navegador y no se subirá a GitHub):");
    if (!apiKey) return;
    localStorage.setItem('anthropic_api_key', apiKey.trim());
  }

  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage(text, 'user');
  history.push({ role: 'user', content: text });

  typingEl.classList.add('show');
  messagesEl.scrollTop = messagesEl.scrollHeight;
  statusEl.textContent = 'escribiendo...';
  statusEl.className = 'header-status typing';

  try {
    // Usamos un proxy de CORS para evitar el bloqueo del navegador de forma directa
    const proxyUrl = 'https://corsproxy.io/?';
    const apiUrl = 'https://api.anthropic.com/v1/messages';

    const res = await fetch(proxyUrl + apiUrl, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'x-api-key': apiKey, 
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20240620',
        max_tokens: 300,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    if (!res.ok) {
      const errorData = await res.json();
      throw new Error(errorData.error?.message || 'Error en respuesta');
    }

    const data = await res.json();
    const reply = data.content?.[0]?.text || '...';
    
    history.push({ role: 'assistant', content: reply });
    
    setTimeout(() => {
      typingEl.classList.remove('show');
      statusEl.textContent = 'en línea';
      statusEl.className = 'header-status';
      addMessage(reply, 'vale');
    }, 600 + Math.random() * 800);

  } catch(e) {
    console.error(e);
    typingEl.classList.remove('show');
    statusEl.textContent = 'en línea';
    statusEl.className = 'header-status';
    addMessage('Jajaja espera que no me carga algo', 'vale');
    // Si da error, borramos la key por si se ingresó mal, así vuelve a pedirla
    localStorage.removeItem('anthropic_api_key');
  }
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = inputEl.scrollHeight + 'px';
 });
</script>
