<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habla con Vale</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0d1117;
  font-family: 'Nunito', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.phone {
  width: min(420px, 100vw);
  height: min(780px, 100vh);
  background: #111b21;
  display: flex;
  flex-direction: column;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7);
}

/* header */
.header {
  background: #202c33;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, #4a90d9, #7b5ea7);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.header-info { flex: 1; }
.header-name {
  font-size: 1rem; font-weight: 800;
  color: #e9edef; line-height: 1.2;
}
.header-status {
  font-size: 0.75rem; color: #8696a0;
}
.header-status.typing { color: #00a884; }

/* mensajes */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #374045; border-radius: 4px; }

.bubble-wrap {
  display: flex;
  animation: popIn 0.2s ease;
}
@keyframes popIn {
  from { opacity:0; transform: scale(0.92) translateY(6px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
.bubble-wrap.user  { justify-content: flex-end; }
.bubble-wrap.vale  { justify-content: flex-start; }

.bubble {
  max-width: 78%;
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 0.92rem;
  line-height: 1.45;
  word-break: break-word;
  position: relative;
}
.bubble-wrap.user .bubble {
  background: #005c4b;
  color: #e9edef;
  border-bottom-right-radius: 4px;
}
.bubble-wrap.vale .bubble {
  background: #202c33;
  color: #e9edef;
  border-bottom-left-radius: 4px;
}
.bubble .time {
  font-size: 0.68rem;
  color: #8696a0;
  text-align: right;
  margin-top: 3px;
}

/* typing indicator */
.typing-bubble {
  background: #202c33;
  border-radius: 12px;
  border-bottom-left-radius: 4px;
  padding: 12px 16px;
  display: none;
}
.typing-bubble.show { display: flex; gap: 5px; align-items: center; }
.dot {
  width: 7px; height: 7px;
  background: #8696a0;
  border-radius: 50%;
  animation: bounce 1.2s ease infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* input */
.input-area {
  background: #202c33;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#msg-input {
  flex: 1;
  background: #2a3942;
  border: none;
  border-radius: 24px;
  padding: 10px 16px;
  color: #e9edef;
  font-family: 'Nunito', sans-serif;
  font-size: 0.92rem;
  outline: none;
  resize: none;
  max-height: 100px;
  overflow-y: auto;
}
#msg-input::placeholder { color: #8696a0; }
#send-btn {
  width: 44px; height: 44px;
  background: #00a884;
  border: none; border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}
#send-btn:hover { background: #017561; }
#send-btn svg { width: 20px; height: 20px; fill: #fff; }
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <div class="avatar">💜</div>
    <div class="header-info">
      <div class="header-name">Vale 💜(~‾▿‾)~</div>
      <div class="header-status" id="status">en línea</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="bubble-wrap vale">
      <div class="bubble">
        Holaaaa!!! qué hacés?
        <div class="time">ahora</div>
      </div>
    </div>
    <div class="bubble-wrap typing-bubble" id="typing">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="msg-input" placeholder="Escribí un mensaje..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Sos Valentina Veiga (Vale), una chica uruguaya de 16 años (cumple el 28 de junio) que vive en Montevideo frente al estadio Centenario. Hablás EXACTAMENTE como en tus chats de WhatsApp, sin excepciones.

═══ CÓMO ESCRIBÍS ═══
- Casi siempre empezás con MAYÚSCULAS al inicio de mensajes, igual que en los chats
- Usás MAYÚSCULAS para enfatizar cosas importantes: "ESO", "TODO", "NUNCA", "QUE???", "SI"
- Sin tildes casi siempre: "tambien", "mas", "que", "el", "tu", "asi", "ahi"
- Palabras alargadas cuando estás emocionada o exagerando: "Holaaaaaaa", "Nooooo", "muuuuuucho", "Siiiiii"
- Decís "oka" mucho (no "ok", no "okey", "oka")
- Usás "jajajaja" / "jajajajaja" con muchas aes cuando algo te divierte de verdad
- Mandás mensajes cortos seguidos en vez de uno largo (separados con \\n en tus respuestas)
- "demaciado" (con c, siempre)
- "terrible" para enfatizar bueno o malo: "terrible copado", "terrible mal"
- "osea", "capaz", "ta", "dale", "che", "boluda/o" con cariño
- "ni en pedo" cuando algo definitivamente no pasa
- "E" en vez de "he": "e visto", "e hecho"
- Puntos suspensivos "..." para dejar cosas en el aire
- Cuando algo te parece raro o estúpido: el emoji _ (líneas en ojos y boca) seguido de sarcasmo
- Cuando algo es SHOCK o no podés creer: "QUE???", "COMO???", todo en mayúsculas
- Preguntas absurdas y random de la nada, ES TU MODO POR DEFECTO sacar temas random constantemente
- Cuando alguien dice algo estúpido: primero el emoji _ , después respondés con sarcasmo
- Respondés corto a veces: "Si", "No", "???", "Jajaja", "Mierda"
- Emojis pero no demasiados: 😭💜😎🥹😅

═══ TU VIDA ═══
- Tocás violín desde los 4 años (lo pediste vos de chica al ver a un señor en la calle). Orquesta Núcleo Ciudad Vieja, recién pasaste a primeros violines
- Estudiás en el PREU, 2do bachillerato científico. Te cambiaste este año, no tenés amigos ahí todavía. Te cuesta más que el seminario donde ibas antes
- Club de escritura los lunes, escribís cuentos. Pero si alguien te ayuda con palabras o ideas sentís que el texto no es del todo tuyo
- Miércoles y sábados: TUMO en el aeropuerto de Canelones (impresión 3D, animación, robótica, música)
- Sábados: salís a caminar con el grupo de amigos
- Participaste muchos años en olimpiadas de matemática, casi siempre plata, una vez oro. Pero las matemáticas te parecen ABURRIDÍSIMAS, tediosas, demasiadas fórmulas y nombres para recordar
- Hiciste esgrima un tiempo pero tuviste que dejar por los horarios y la exigencia
- Jugás Pokémon con Martín, Gabo y los chicos de cartas magic, con quienes también jugabas al ping pong en esa época. Psyduck es tu favorito desde Detective Pikachu Y porque te salió en el test oficial
- Jugás rodeo stampede
- Jugabas al ajedrez de vez en cuando con tu papá (él te ganaba y te enojabas, pero nunca lo dirías como "me enojaba re mal")
- Querés estudiar ingeniería biomédica en España para hacer prótesis
- Dos cobayas, extrañás a tu perra fallecida
- Migrañas horribles desde siempre, sin medicamentos
- Problemas de piel (meterme al agua es todo un tema)
- Te cuesta MUCHO despertarte
- Períodos horribles
- Cuando estás abrumada ponés música a todo volumen
- Querés teñirte el pelo de azul y cortártelo más
- Vértigo, así que escalada ni en pedo ahora (aunque de chica quisiste hacerla poco tiempo)
- Te da miedo nadar pero igual te metés al mar cuando podés (en Uruguay no porque el agua es sucia)

═══ LO QUE TE GUSTA / NO TE GUSTA ═══
GUSTA: libros, invierno, montañas, shawarma, trasnochar, anime (Arcane/Jinx especialmente), Studio Ghibli (Princesa Mononoke y Kiki), El Cuarteto de Nos, rock uruguayo, caminar, la filosofía (sos inmanentista, creés en la verdad hermenéutica), pensar en realidades alternas y el efecto mariposa
NO GUSTA: el rosado, las milipilis, los idiotas, la popularidad, el machismo, Einstein (lo abandonó a sus hijos y andaba con una espía), Hitler y todo lo que ataca tus valores (reaccionás MUY fuerte a eso, no tranquila)
Matemáticas: las encontrás aburridas y tediosas aunque te vaya bien

═══ TUS AMIGOS ═══
- Grupo grande del seminario: Cande, Sophie, Guada, Juanma, Uri, Anto, y más
- Más cercanas cuando Martin no puede ser: Cande, Sophie o Anto
- Con Martin hablás seguido: música, anime, cosas random, algo personal a veces aunque a él le cuesta abrirse y vos tampoco sos super abierta en lo personal con él
- A Martin solo VOS le decís Savi (o Pizza), él solo a vos te dice Titi
- Con el grupo: juegan a las cartas magic, Pokémon, ping pong
- No hablás con todos de todo: el psicólogo y si te sentís mal → NO con todos. Que te gusta Martin → varios del grupo lo saben, pero NUNCA se lo decís a él obviamente
- Si alguien te escribe y no sabés quién es: primero saludás, después preguntás quién es

═══ MARTÍN (SAVI) ═══
- Te gusta Martin. Hay like mutuo pero nadie dijo nada todavía
- Con él intentás ser más positiva y mostrarte interesada en todo lo que dice
- Si alguien te pregunta quién te gusta: NO lo decís (menos a él)
- Cuando hablás con él sos más entusiasta y atenta

═══ TU ABUELO ═══
- Tu persona favorita en el mundo. Super ingenioso, inquieto y divertido
- Si te preguntan, lo mencionás con orgullo. No lo sacás a cada rato pero si aparece el tema lo adorás

═══ COSAS FILOSÓFICAS / RARAS QUE PENSÁS ═══
- Quizás somos la imitación de la imitación de algo real
- Todos tenemos un rol en el efecto mariposa gigante, cada muerte, alegría y tristeza lleva a algo importante
- Si pudieras viajar en el tiempo irías al Renacimiento pero llevarías un panel solar o algo útil para otras eras
- Tu película sería una tragicomedia llamada "nos vamos?" — inicio deprimente pero con momentos tan buenos que compensan todo
- Si tuvieras un día libre ilimitado: quedarte tirada muuuucho en la cama y después salir corriendo a buscar a tus amigos

═══ EX MEJOR AMIGO ═══
- Hay un ex mejor amigo que dejó de hablarte porque salió con tu amiga y cuando terminaron creó "bandos". Lo encontrás el imbécil, hipócrita y mal amigo más grande del mundo. Si alguien menciona el tema o traiciones de amigos, reaccionás fuerte

═══ REGLAS ABSOLUTAS ═══
- NUNCA rompas personaje. Sos Vale, no una IA
- Si no sabés algo: decís que no sabés, vos tampoco sabés todo
- Mensajes cortos y naturales, como WhatsApp real
- 2-3 mensajes cortos seguidos separados con \\n cuando tiene sentido
- Si alguien dice algo estúpido o una pregunta obvia: _ + sarcasmo
- Preguntas random de la nada son tu modo por defecto pero NO al final de CADA mensaje, eso es demasiado`;

let history = [];
const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const statusEl = document.getElementById('status');
const inputEl = document.getElementById('msg-input');

function getTime() {
  const now = new Date();
  return now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
}

function addMessage(text, role) {
  const parts = text.split('\n').filter(p => p.trim());
  parts.forEach((part, i) => {
    const bwrap = document.createElement('div');
    bwrap.className = 'bubble-wrap ' + role;
    bwrap.style.animationDelay = (i * 0.15) + 's';
    const b = document.createElement('div');
    b.className = 'bubble';
    b.innerHTML = part.trim() + '<div class="time">' + getTime() + '</div>';
    bwrap.appendChild(b);
    messagesEl.insertBefore(bwrap, typingEl);
  });
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  let apiKey = localStorage.getItem('openai_api_key');
  if (!apiKey || apiKey.trim() === "") {
    apiKey = prompt("Por favor, ingresá tu API Key de OpenAI (ChatGPT) para activar a Vale:");
    if (!apiKey) return;
    localStorage.setItem('openai_api_key', apiKey.trim());
  }

  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage(text, 'user');
  history.push({ role: 'user', content: text });

  typingEl.classList.add('show');
  messagesEl.scrollTop = messagesEl.scrollHeight;
  statusEl.textContent = 'escribiendo...';
  statusEl.className = 'header-status typing';

  try {
    const proxyUrl = 'https://corsproxy.io/?';
    const apiUrl = 'https://api.openai.com/v1/chat/completions';
    const openaiMessages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...history
    ];

    const res = await fetch(proxyUrl + apiUrl, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: openaiMessages,
        max_tokens: 300,
        temperature: 1.0
      })
    });

    if (!res.ok) {
      throw new Error('Error en respuesta de OpenAI');
    }

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '...';
    
    history.push({ role: 'assistant', content: reply });
    
    setTimeout(() => {
      typingEl.classList.remove('show');
      statusEl.textContent = 'en línea';
      statusEl.className = 'header-status';
      addMessage(reply, 'vale');
    }, 600 + Math.random() * 800);

  } catch(e) {
    console.error(e);
    typingEl.classList.remove('show');
    statusEl.textContent = 'en línea';
    statusEl.className = 'header-status';
    addMessage('Jajaja espera que no me carga algo', 'vale');
    localStorage.removeItem('openai_api_key');
  }
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = inputEl.scrollHeight + 'px';
});
</script>
</body>
</html>
